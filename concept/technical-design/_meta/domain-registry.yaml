# Domain-Registry — Bounded-Context-Schnitt von AK3 (siehe 00_index.md §9.10).
#
# Schema pro Eintrag:
#   id:            kebab-case, eindeutig
#   display_name:  menschenlesbar
#   contract_docs: [FK-NN, ...]   # Docs mit Vertragscharakter (surface=contract abgeleitet)
#   member_docs:   [FK-NN, ...]   # Innenleben der Domaene (surface=internal)
#
# Pflege:
# - Ein FK-Doc darf in genau einer Domaene Mitglied sein (Bounded Context
#   ist disjunkt).
# - Ein FK-Doc, das in `contract_docs` steht, darf nicht zusaetzlich in
#   `member_docs` derselben Domaene auftauchen.
# - Glossar-Inhalte leben im Contract-Doc selbst (siehe 00_index.md §9.11).
#
# Initiale Befuellung 2026-04-29 nach BC-Vorgabe (concept/technical-design/_meta/bounded-contexts.yaml).
#
# Foundation/Adapter/Querschnittskataloge sind hier KEINE Domaene
# (siehe bounded-contexts.yaml §foundation_principles). Solche Docs
# tragen stattdessen `cross_cutting: true` im Frontmatter und sind
# damit fail-closed-konform aus L17/L18 ausgenommen — siehe
# 00_index.md §9.13.

