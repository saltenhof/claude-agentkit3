title: "Create-Time-Conflict-Adjudicator: LLM-Konfliktbewertung (FK-21 §21.4.1 Schritt 3) im pre-story Create-Scope, entkoppelt vom execution-scoped StructuredEvaluator"
type: implementation
status: ready
phase: setup
