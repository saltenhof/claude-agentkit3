# SUPERSEDED (wird NICHT implementiert, PO-Entscheidung 2026-07-02): Die Praemisse
# ist fachlich falsch. Ein automatischer 5-Min-Lease-Takeover darf es gar nicht
# geben — AgentKit kann client-seitiges Schweigen (tot? Langlaeufer? Pause? wartet
# auf Benutzereingabe?) prinzipiell nicht deuten, also darf Ownership NIE
# automatisch ablaufen/entzogen werden, und ein Heartbeat/Automatismus hat kein
# Recht, eine Session zu entreissen. Korrektes Zielmodell: Story-Lifecycle an eine
# besitzende Session gekoppelt (SessionRunBinding); Ownership laeuft nie ab;
# Uebernahme nur EXPLIZIT, folgenschwer, von Mensch (UI) oder Agent (Control-Plane-
# API) beantragt (Session-Rebind, alter Owner entmuendigt) — kein Automatismus;
# einzige technische Nebenlaeufigkeits-Garantie = In-Flight-Idempotenz +
# Serialisierung PRO MUTIERTEM OBJEKT (Reads frei parallel). Ersetzt durch neue
# Stories nach normativer Konzept-Verankerung + GAP-Analyse (siehe README §6.7).
# Uncommittete Fix-Arbeit revertet.
# ENTDECKT in der AG3-130-Codex-Review-Runde 3 (results/ag3-130-review3-codex.md,
# Fund 1), vom Orchestrator gegen den Code verifiziert: der geleaste, owner-
# scoped Claim (AG3-054) uebernimmt einen >5-Min-alten Claim per CAS als
# "abgestuerzt". Bei einem langsamen (nicht abgestuerzten) Owner fuehrt das zu
# Doppel-Dispatch bzw. zu "Engine hat fortgeschritten, aber kein dauerhafter
# Control-Plane-Op-Record". Querschnittlich: betrifft start_phase UND
# resume_phase. KEIN AG3-130-Defekt (Mechanismus ist aelter, AG3-130 spiegelt
# nur start). Anker: control_plane/runtime.py:83 (_CLAIM_LEASE_TTL=5min),
# :68-69 (CAS-Uebernahme), claim_operation/_acquire_claim.
