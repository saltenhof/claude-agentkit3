story_id: AG3-114
title: "§91.1a Agent-Surface fuer Story-Create: ProjectEdgeClient.create_story + Target-Project-Tool-Entry gegen POST /v1/stories (FK-91 §91.1a, FK-21 ReconciliationEvidence) — Ersatz fuer gh issue create"
type: implementation
status: ready
phase: setup
created: "2026-06-12"
size: L
# Herkunft: PO-Entscheidung 2026-06-12. FK-91 §91.1a Regel #9: Stories werden ausschliesslich
# ueber die Control-Plane-API angelegt; GitHub ist nie Story-Wahrheit. Regel #3: Agents nutzen
# ausschliesslich den ProjectEdgeClient gegen die REST-API (nicht CLI, nicht curl). Ist-Zustand:
# POST /v1/stories existiert + erzwingt ReconciliationEvidence (AG3-068), der ProjectEdgeClient
# ist gebaut + als Target-Project-Tool deployt (tools/agentkit/projectedge.py) — aber der Client
# hat KEIN create_story und das Tool keinen create-story-Entry. Diese Story schliesst die Luecke,
# damit der create-userstory-Skill Stories nativ ueber den Client anlegt statt via gh issue create.
# Entblockt AG3-113 (Bundle-Re-Cut), das wiederum AG3-111 entblockt.
depends_on:
  - AG3-014
  - AG3-068
  - AG3-090
unblocks:
  - AG3-113
